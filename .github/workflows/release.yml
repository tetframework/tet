name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Run tests
        run: pytest

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Skip dev tags (e.g. v0.6.0.dev1); release pre-releases (aN/bN/rcN) and finals.
    if: ${{ !contains(github.ref, 'dev') }}
    environment:
      name: release
      url: https://pypi.org/project/tet/
    permissions:
      id-token: write  # mandatory for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password — authenticated via OIDC trusted publisher
          skip-existing: true
